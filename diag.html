<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Boilermakers Hub — Diagnostics</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;background:#111;color:#eee;margin:20px}
  .ok{color:#9fdb6d}.bad{color:#ff6b6b}.muted{color:#9aa0a6}.card{background:#1b1c1e;border:1px solid #2c2d31;border-radius:12px;padding:16px;margin:12px 0}
  code{background:#222;padding:2px 6px;border-radius:6px}
</style>
</head>
<body>
<h1>Diagnostics</h1>
<p class="muted">This page checks that required JSON/CSS/JS files exist and are readable by the browser.</p>
<div id="out"></div>
<script>
async function check(path, expectJson=false){
  try{
    const res = await fetch(path,{cache:'no-store'});
    const ok = res.ok;
    let detail = ok ? res.status+' '+res.statusText : res.status;
    if(ok && expectJson){
      try{ await res.json(); detail += ' (valid JSON)'; }catch(e){ detail += ' (invalid JSON)'; }
    }
    return {path, ok, detail};
  }catch(e){ return {path, ok:false, detail:String(e)}; }
}
(async ()=>{
  const checks = [
    ['index.html', false],
    ['static/js/pro.js', false],
    ['static/css/pro.css', false],
    ['static/build.json', true],
    ['static/teams/purdue-mbb/items.json', true],
    ['static/schedule.json', true],
    ['static/widgets.json', true],
    ['static/sources.json', true],
  ];
  const out = document.getElementById('out');
  for (const [p, j] of checks){
    const r = await check(p, j);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div><strong>${r.ok?'<span class="ok">OK</span>':'<span class="bad">FAIL</span>'}</strong> <code>${p}</code></div>
                     <div class="muted">${r.detail}</div>`;
    out.appendChild(div);
  }
})();
</script>
</body>
</html>
