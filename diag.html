<!DOCTYPE html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Diagnostics</title></head><body><div id="out">diag</div><script>
async function check(path){try{let r=await fetch(path,{cache:'no-store'});return r.ok}catch(e){return false}}
(async()=>{let files=['index.html','static/js/pro.js','static/css/pro.css','static/build.json','static/teams/purdue-mbb/items.json','static/schedule.json','static/widgets.json','static/sources.json'];let out=document.getElementById('out');for(let f of files){let ok=await check(f);let p=document.createElement('p');p.textContent=(ok?'OK   ':'FAIL ')+f;out.appendChild(p);}})();
</script></body></html>
