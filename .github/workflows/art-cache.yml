name: Build & Cache Artwork

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
  push:
    branches: [ main ]

jobs:
  build-art:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: |
          echo '{ "type":"module" }' > package.json
          npm install node-fetch@3 jsdom@24 sharp@0.33
      - run: node scripts/cache-images.mjs
        env: { OFFICIAL_ONLY: "1" }
      - run: |
          git config user.name "art-cache-bot"
          git config user.email "actions@github.com"
          git add static/cache/ static/teams/**/items.json
          git commit -m "chore: refresh cached artwork" || echo "No changes"
          git push