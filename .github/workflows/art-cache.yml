name: Build & Cache Artwork

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"  # daily 07:17 UTC
  push:
    branches: [ main ]

jobs:
  build-art:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          cat > package.json <<'JSON'
          {
            "name": "sports-app-art-cache",
            "private": true,
            "type": "module",
            "scripts": {
              "cache:images": "node scripts/cache-images.mjs"
            },
            "dependencies": {
              "jsdom": "24.1.0",
              "node-fetch": "3.3.2",
              "sharp": "0.33.4"
            }
          }
          JSON
          npm ci

      - name: Cache images (official/friendly sources only)
        run: npm run cache:images
        env:
          OFFICIAL_ONLY: "1"

      - name: Commit updated assets
        run: |
          git config user.name "art-cache-bot"
          git config user.email "actions@github.com"
          git add static/cache/ static/teams/**/items.json
          git commit -m "chore: refresh cached artwork" || echo "No changes"
          git push