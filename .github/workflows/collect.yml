name: Collect & Publish

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser PyYAML rapidfuzz

      - name: Show repo tree (debug)
        run: |
          echo "ROOT:"; ls -la
          echo "SRC:"; ls -la src || true
          echo "feeds.yaml (head):"; sed -n '1,80p' src/feeds.yaml || true

      - name: Verify feeds.yaml loads
        run: |
          python - <<'PY'
          import yaml,sys
          conf = yaml.safe_load(open("src/feeds.yaml"))
          if not conf or not isinstance(conf, dict):
            print("ERROR: feeds.yaml not parsed or empty"); sys.exit(2)
          print("Teams found:", list(conf.keys()))
          PY

      - name: Collect feeds (verbose)
        run: |
          set -e
          python src/collect.py
          echo "Collector finished."

      - name: Commit JSON (if changed)
        run: |
          git config user.name "gh-actions"
          git config user.email "actions@users.noreply.github.com"
          git add static/teams/**/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update items.json ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi
