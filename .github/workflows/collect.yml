name: Collect Feeds

on:
  schedule:
    - cron: "*/30 * * * *"   # ⏱️ Auto-run every 30 minutes
  workflow_dispatch:        # ▶️ Allow manual runs in the Actions tab

jobs:
  update-feeds:
    name: Update and Commit Feeds
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4

      - name: 🔄 Run collector script
        run: python tools/collect.py

      - name: 📤 Commit and push updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add static/teams/purdue-mbb/items.json
          git commit -m "🤖 Auto-update feeds [skip ci]" || echo "✅ No changes to commit"
          git push
