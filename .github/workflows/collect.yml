name: Auto-update feeds

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Run collector (news/videos/etc.)
        run: python tools/collect.py

      - name: Build schedule (ICS + Odds)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          echo "----------------------------------------"
          echo "Building Purdue MBB schedule (ICS + Odds)"
          if [ -n "${ODDS_API_KEY}" ]; then
            echo "Odds API active and will be queried."
          else
            echo "No ODDS_API_KEY set — skipping odds integration."
          fi
          python tools/schedule_collect.py
          echo "Schedule build step complete."
          echo "----------------------------------------"

      - name: Update version tags for cache busting
        run: |
          ver=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          sed -i "s#app.css?v=[^\"']*#app.css?v=$ver#g" index.html || true
          sed -i "s#app.js?v=[^\"']*#app.js?v=$ver#g" index.html || true
          sed -i "s#pro.js?v=[^\"']*#pro.js?v=$ver#g" index.html || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update feeds + schedule ($(date -u +'%Y-%m-%d %H:%M:%SZ'))"
            git push
          fi
