name: Build data (news, schedule, roster)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
  push:
    paths:
      - "tools/collect.py"
      - "static/schedule_overrides.json"
      - "static/beat_links.json"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (none needed)
        run: |
          python -V

      - name: Build data JSON (rankings, schedule, beat links)
        run: |
          python tools/collect.py

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain static/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add static/data
            git commit -m "Build data json via collect.py [skip ci]"
          fi

      - name: Push
        if: success()
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
