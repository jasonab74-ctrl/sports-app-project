name: Build and Deploy Purdue MBB Hub

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser pyyaml rapidfuzz python-dateutil requests

      - name: Run collector (best-effort)
        env:
          TEAMS: "purdue-mbb"
        run: python tools/collect.py || true

      - name: Build stamp, health, and disable Jekyll
        run: |
          echo > .nojekyll
          ITEMS_FILE="static/teams/purdue-mbb/items.json"
          for i in 1 2 3; do [ -s "$ITEMS_FILE" ] && break || sleep 1; done
          ITEMS_COUNT=$(python - <<'PY'
import json,os
p="static/teams/purdue-mbb/items.json"
try:
    j=json.load(open(p))
    print(len(j.get("items",[])) or 0)
except Exception:
    print(0)
PY
)
          TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          SHA=$(git rev-parse --short HEAD || echo "unknown")
          mkdir -p static
          printf '{"timestamp":"%s","commit":"%s","items_count":%s}\n' "$TS" "$SHA" "$ITEMS_COUNT" > static/build.json
          printf '{"ok":true,"timestamp":"%s","items_count":%s}\n' "$TS" "$ITEMS_COUNT" > static/health.json

      - name: Assert SPA artifact integrity
        run: |
          test -f index.html
          grep -q 'id="build-line"' index.html
          test -f static/js/pro.js
          test -f static/css/pro.css
          JS_SIZE=$(wc -c < static/js/pro.js); echo "pro.js size: $JS_SIZE"
          CSS_SIZE=$(wc -c < static/css/pro.css); echo "pro.css size: $CSS_SIZE"
          if [ "$JS_SIZE" -lt 3000 ] || [ "$CSS_SIZE" -lt 3000 ]; then
            echo "ERROR: JS/CSS look too small (placeholders?)."; exit 1;
          fi

      - name: Remove legacy homepage files (artifact-only)
        run: |
          rm -f index.md
          if [ -f docs/index.html ]; then rm -f docs/index.html; fi
          if [ -f docs/index.md ]; then rm -f docs/index.md; fi

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify LIVE site contains SPA marker
        run: |
          LIVE_URL="https://jasonab74-ctrl.github.io/sports-app-project/"
          echo "Checking $LIVE_URL ..."
          curl -fsSL "$LIVE_URL" | grep -q 'id="build-line"' && echo "Live check OK" || (echo "ERROR: Live site is not the SPA (build-line marker missing)"; exit 1)