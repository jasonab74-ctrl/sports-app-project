name: Build data (news, schedule, rankings, beat links)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser python-dateutil requests

      - name: Build news & beat links
        run: |
          python tools/collect.py --news --beat

      # NOTE: schedule & rankings are already working in your repo; we keep them as-is.
      # If you also generate them via Python, add flags here (e.g., --schedule --rankings).

      - name: Commit artifacts (static/data/*.json)
        run: |
          git config user.name "github-bot"
          git config user.email "actions@github.com"
          git add static/data/news.json static/data/beat_links.json
          git commit -m "Auto-update news & beat_links" || echo "Nothing to commit"
          git push

  pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4