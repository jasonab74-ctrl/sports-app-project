name: Auto-update feeds

on:
  # Default: run every 3 hours (keeps the site fresh in-season)
  schedule:
    - cron: "0 */3 * * *"
  # Manual trigger anytime from the GitHub UI
  workflow_dispatch:
  # Optional: also run when pushing to main (uncomment if you want this)
  # push:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser requests

      - name: Run collector
        run: python tools/collect.py

      - name: Update version tags for cache busting
        run: |
          ver=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          sed -i "s#app.css?v=[^\"']*#app.css?v=$ver#g" index.html || true
          sed -i "s#app.js?v=[^\"']*#app.js?v=$ver#g" index.html || true
          sed -i "s#pro.js?v=[^\"']*#pro.js?v=$ver#g" index.html || true
          echo "Cache version updated to $ver"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update feeds + cache bust ($(date -u +'%Y-%m-%d %H:%M:%SZ'))"
            git push
          fi

# To switch to a single daily update at 6 AM America/Phoenix (UTC-7), replace the cron above with:
#   schedule:
#     - cron: "0 13 * * *"   # 13:00 UTC == 06:00 Phoenix (no DST)
