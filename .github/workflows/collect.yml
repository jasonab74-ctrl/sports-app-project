name: Collect Feeds

on:
  schedule:
    - cron: "*/30 * * * *"   # ⏱️ Auto-run every 30 minutes
  workflow_dispatch:        # ▶️ Allow manual runs in the Actions tab

jobs:
  update-feeds:
    name: Update and Commit Feeds
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 pyyaml rapidfuzz

      # You can switch this to tools/collect.py (shim) if you prefer.
      - name: 🔄 Run collector
        run: python src/collect.py

      - name: 📤 Commit and push updates
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add static/teams/purdue-mbb/items.json
          git commit -m "🤖 Auto-update feeds [skip ci]" || echo "✅ No changes to commit"
          git push
