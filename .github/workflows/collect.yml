name: Build data (news, schedule, roster)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}
  push:
    # Rebuild on ANY push to keep data fresh when you edit HTML/CSS/JS.
    paths-ignore:
      # Avoid action loops when the job itself commits fresh JSON.
      - "static/data/news.json"
      - "static/teams/purdue-mbb/schedule.json"
      - "static/teams/purdue-mbb/roster.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4

      - name: Collect Headlines (Purdue-focused)
        run: python tools/collect.py

      - name: Collect Schedule (incl. exhibitions & tourneys)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python tools/schedule_collect.py

      - name: Collect Roster (official page)
        run: python tools/roster_collect.py

      - name: Commit artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build news/schedule/roster [skip ci]"
          file_pattern: |
            static/data/news.json
            static/teams/purdue-mbb/schedule.json
            static/teams/purdue-mbb/roster.json