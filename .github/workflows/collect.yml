name: Collect Purdue MBB Content

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch: {}
  push:
    paths:
      - "static/sources.json"
      - ".github/workflows/collect.yml"
      - "tools/collect.py"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Collect items.json
        run: |
          python tools/collect.py

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "team-hub-bot"
            git config user.email "actions@users.noreply.github.com"
            git add static/teams/purdue-mbb/items.json
            git commit -m "chore: update items.json [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
