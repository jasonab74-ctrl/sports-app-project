name: Auto-update feeds

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install feedparser requests

      - name: Run collector
        run: python tools/collect.py

      - name: Update version tags for cache busting
        run: |
          ver=$(date +'%Y-%m-%dT%H:%M:%S')
          sed -i "s#app.css?v=[^\"']*#app.css?v=$ver#g" index.html
          sed -i "s#app.js?v=[^\"']*#app.js?v=$ver#g" index.html
          sed -i "s#pro.js?v=[^\"']*#pro.js?v=$ver#g" index.html
          echo "Cache version updated to $ver"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --quiet && echo "No changes" || (git commit -m "Auto-update feeds and cache bust ($ver)" && git push)
