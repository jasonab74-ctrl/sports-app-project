name: Build and Deploy Purdue MBB Hub

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser pyyaml rapidfuzz python-dateutil requests

      - name: Run collector (best-effort)
        env:
          TEAMS: "purdue-mbb"
        run: python tools/collect.py || true

      - name: Build stamp + disable Jekyll
        run: |
          echo > .nojekyll
          ITEMS_COUNT=$(python - <<'PY'
import json
try:
  j=json.load(open('static/teams/purdue-mbb/items.json'))
  print(len(j.get('items',[])))
except Exception:
  print(0)
PY
)
          TS=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          SHA=$(git rev-parse --short HEAD || echo "unknown")
          mkdir -p static
          cat > static/build.json <<EOF
{"timestamp":"$TS","commit":"$SHA","items_count":$ITEMS_COUNT}
EOF

      - name: Remove legacy homepage files (safety)
        run: |
          rm -f index.md
          if [ -f docs/index.html ]; then rm -f docs/index.html; fi
          if [ -f docs/index.md ]; then rm -f docs/index.md; fi

      - name: Assert SPA will be deployed
        run: |
          test -f index.html
          grep -q 'id="build-line"' index.html
          echo "index.html (SPA) is present and has build-line marker."

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
