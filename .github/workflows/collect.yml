name: Build data (news, schedule, roster)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "tools/**"
      - "static/**"
      - ".github/workflows/collect.yml"
  schedule:
    # Every 30 minutes (UTC). Good balance for news freshness & API courtesy.
    - cron: "*/30 * * * *"

permissions:
  contents: write   # to commit JSON back to the repo
  pages: read

concurrency:
  group: collect-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      # If your collector is the one I sent earlier, it has no external deps.
      # Keep this step here in case you later decide to add any stdlib-only stubs.
      - name: Ensure directories exist
        run: |
          mkdir -p static/data
          mkdir -p static/teams/purdue-mbb

      - name: Run collector
        run: python tools/collect.py

      - name: Commit changes (if any)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only add the files we expect to change
          git add -A static/data static/teams/purdue-mbb

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "Build data: news/schedule/roster (${TS})"
            git push
          fi

      # Optional: make it obvious in the logs what changed
      - name: Show last commit
        run: git --no-pager log -1 --name-status