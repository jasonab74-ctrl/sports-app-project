name: Build data (news, schedule, roster)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "tools/**"
      - "static/sources.json"
      - ".github/workflows/collect.yml"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 lxml pytz

      - name: Run collector
        run: |
          python tools/collect.py

      - name: Commit collected data
        run: |
          if [ -n "$(git status --porcelain static/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add static/data
            git commit -m "chore: auto-build news/schedule/roster [skip ci]" || true
          else
            echo "No data changes."
          fi