name: Build data (news, schedule, roster)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Ensure folders
        run: |
          mkdir -p static/data
          mkdir -p tools

      - name: Run collector
        run: python tools/collect.py

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain static/data)" ]]; then
            git add static/data
            git commit -m "chore: refresh data [skip ci]"
            git push
          else
            echo "No data changes."
          fi