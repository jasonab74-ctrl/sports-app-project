name: Build & Deploy (data + site)

on:
  schedule:
    - cron: "*/30 * * * *"    # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (best-effort)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install feedparser requests python-dateutil || true

      - name: Run collector
        run: |
          # Your collector can be a no-op for pieces you already generate elsewhere.
          # This just ensures static/data/*.json exist and are fresh.
          python tools/collect.py || true

      - name: Write version file (used for cache-busting)
        run: |
          mkdir -p static/data
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"built_at\":\"$TS\",\"run_id\":\"${{ github.run_id }}\",\"sha\":\"${{ github.sha }}\"}" > static/data/_version.json
          cat static/data/_version.json

      - name: Upload Pages artifact (entire repo contents)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4