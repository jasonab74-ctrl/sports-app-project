name: Collect & Publish

on:
  push:                     # <-- run on any commit to main
    branches: [ main ]
  schedule:
    - cron: "*/30 * * * *"  # every 30 min
  workflow_dispatch:        # optional manual run

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser PyYAML rapidfuzz

      - name: Collect feeds
        run: python src/collect.py

      - name: Commit JSON (if changed)
        run: |
          git config user.name "gh-actions"
          git config user.email "actions@users.noreply.github.com"
          git add static/teams/**/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update items.json ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
            git push
          fi
