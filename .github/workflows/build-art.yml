name: Build & Cache Artwork

on:
  push:
    branches: [ "main" ]
    paths:
      - "scripts/**"
      - "static/**"
      - "package.json"
      - ".github/workflows/build-art.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-art:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting build-art"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (lockfile-aware)
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found -> npm ci"
            npm ci --no-audit --no-fund
          elif [ -f yarn.lock ]; then
            echo "yarn.lock found -> yarn install"
            corepack enable
            yarn install --immutable=false
          elif [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found -> pnpm install"
            corepack enable
            pnpm install --frozen-lockfile=false
          else
            echo "No lockfile found -> npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build artwork (if present)
        run: |
          if [ -f scripts/build-art.js ]; then
            node scripts/build-art.js
          else
            echo "No scripts/build-art.js present; skipping."
          fi

      - name: Commit cached artwork (if changed)
        run: |
          if [ -n "$(git status --porcelain static | grep -v '^??')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add static
            git commit -m "Build & Cache Artwork [skip ci]" || true
          else
            echo "No artwork changes."
          fi