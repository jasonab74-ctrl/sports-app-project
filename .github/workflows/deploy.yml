name: Build and Deploy Purdue MBB Hub

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser pyyaml rapidfuzz python-dateutil requests

      - name: Run collector (top 20)
        env:
          TEAMS: "purdue-mbb"
        run: |
          python tools/collect.py || true

      - name: Stamp build info
        run: |
          set -e
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SHA=$(git rev-parse --short HEAD || echo "unknown")
          COUNT=$(jq '.items | length' static/teams/purdue-mbb/items.json 2>/dev/null || echo "0")

          mkdir -p static
          cat > static/build.json <<EOF
          {
            "timestamp": "${TS}",
            "commit": "${SHA}",
            "items_count": ${COUNT}
          }
          EOF

      # Sanity: we expect index.html to exist and the JSONs to exist
      - name: Sanity check artifact
        run: |
          test -f index.html
          test -f static/build.json
          test -f static/teams/purdue-mbb/items.json

      # Configure Pages
      - name: Configure Pages
        uses: actions/configure-pages@v4

      # Upload artifact (the whole repo dir as site)
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4