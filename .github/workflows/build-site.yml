name: Build static index.html from JSON

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # hourly is fine; bump to every 15m if you want

permissions:
  contents: write

jobs:
  build-ssr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm i --no-audit --no-fund
          fi

      # Auto-update results for past games (fills outcome/score/links)
      - name: Sync results
        run: npm run results:sync

      # (You already have headshots + image cache steps in your repo;
      #  leave them in place if present.)
      - name: Build site
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync results & rebuild [skip ci]" || echo "No changes to commit"
          git push || true