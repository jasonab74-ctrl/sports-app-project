name: Build static index.html from JSON

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # hourly is fine

permissions:
  contents: write

jobs:
  build-ssr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm i --no-audit --no-fund
          fi

      # NEW: pull headshots from official site and save locally + update roster.json
      - name: Sync roster headshots
        run: npm run heads:sync

      # Build the site from local JSON + cache
      - name: Build site
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync headshots & rebuild [skip ci]" || echo "No changes to commit"
          git push || true