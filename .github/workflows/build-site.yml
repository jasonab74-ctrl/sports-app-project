name: Build static index.html from JSON

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ssr:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting build"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install builder deps
        run: npm ci

      - name: Build index.html from repo JSON
        run: npm run build:ssr

      - name: Commit generated index.html
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Auto-build index.html [skip ci]" || echo "No changes to commit"
          git push