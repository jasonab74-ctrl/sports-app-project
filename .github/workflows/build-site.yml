name: Build static index.html from JSON

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "*/60 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ssr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install builder deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm i --no-audit --no-fund
          fi

      - name: Build index.html from repo JSON
        run: npm run build

      - name: Commit generated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGES=0
          git add -A
          if ! git diff --cached --quiet; then
            CHANGES=1
            git commit -m "chore: rebuild site [skip ci]"
            git push
          fi
          echo "changed=$CHANGES" >> $GITHUB_OUTPUT