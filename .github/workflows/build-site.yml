name: Build static index.html from JSON

on:
  push:
    branches: [ "main" ]
    paths:
      - "index.html"
      - "scripts/**"
      - "static/**"
      - ".github/workflows/build-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ssr:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting build-ssr"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---- THIS WAS THE FAILING STEP; NOW LOCKFILE-AWARE ----
      - name: Install builder deps (lockfile-aware)
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found -> npm ci"
            npm ci --no-audit --no-fund
          elif [ -f yarn.lock ]; then
            echo "yarn.lock found -> yarn install"
            corepack enable
            yarn install --immutable=false
          elif [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found -> pnpm install"
            corepack enable
            pnpm install --frozen-lockfile=false
          else
            echo "No lockfile found -> npm install"
            npm install --no-audit --no-fund
          fi

      # If you have a build script, keep it. Otherwise this is a no-op.
      # The name matches your prior step so downstream remains unchanged.
      - name: Build static index.html from JSON
        run: |
          if [ -f scripts/build-index.js ]; then
            node scripts/build-index.js
          else
            echo "No scripts/build-index.js present; skipping."
          fi

      - name: Commit generated index.html
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Build static index.html from JSON [skip ci]"
          else
            echo "No changes to index.html"
          fi

      - name: Post Step
        run: echo "Build complete."

      - name: Post Checkout
        run: echo "Done."
