<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  />
  <title>Purdue Boilermakers • Men's Basketball Hub</title>

  <!-- Core styles -->
  <link rel="stylesheet" href="static/css/pro.css"/>

  <!-- Dark theme basic colors for social/link previews -->
  <meta name="theme-color" content="#1a1b1e"/>

  <!-- Basic SEO -->
  <meta name="description" content="Top Purdue Boilermakers Men's Basketball headlines from trusted sources. Updated automatically.">
</head>

<body class="app-shell">
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <div class="brand-icon">
          <!-- little gold chevron / arrow / hammer icon etc;
               you can style this via CSS or leave it empty -->
          <span class="brand-mark"></span>
        </div>
        <div class="brand-text">
          <div class="team-name">Purdue Boilermakers</div>
          <div class="team-sub">Men’s Basketball Hub</div>
        </div>
      </div>

      <!-- mobile nav button (optional) -->
      <button id="hamburger" class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- optional slide-out nav (hidden by default, we keep placeholder hooks) -->
    <nav id="nav" class="main-nav">
      <ul>
        <li><a href="./">Home</a></li>
        <!-- Add external quick links if you want -->
        <!-- <li><a href="https://hammerandrails.com" target="_blank" rel="noopener noreferrer">Hammer & Rails ↗</a></li> -->
      </ul>
    </nav>
  </header>

  <main class="content-wrap">
    <!-- Headlines Section -->
    <section class="panel panel-news">
      <div class="panel-head">
        <h2 class="panel-title">
          Latest Headlines
        </h2>
        <div class="panel-accent"></div>
      </div>

      <!-- If no stories -->
      <div id="news-empty" class="empty-state">
        <p>No Purdue Men’s Basketball headlines yet. New stories will appear here automatically.</p>
      </div>

      <!-- Stories injected here by pro.js -->
      <div id="news-grid" class="news-grid">
        <!-- JS will append each .card -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="legal">
        Auto-updating Purdue Hoops Hub • © <span id="year"></span>
      </div>
      <div id="build-line" class="build-line">
        <!-- JS fills:
             "Build: 2025-10-24T01:23:45Z • commit abc1234 • 20 items • updated 5 min ago"
        -->
      </div>
    </div>
  </footer>

  <!-- App logic -->
  <script src="static/js/pro.js"></script>
</body>
</html>
