<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boilermakers Hub</title>
  <meta name="color-scheme" content="dark light" />
  <style>
    :root { --bg:#0c0f13; --card:#131821; --muted:#9aa4b2; --text:#e9eef5; --brand:#f6c445; --chip:#1b2330; --ok:#2fbf71; --bad:#ff5c5c; --link:#9ec1ff; }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0c0f13,#0a0d10);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif}
    a{color:var(--link);text-decoration:none}
    .wrap{max-width:1080px;margin:24px auto;padding:0 16px}
    header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .dot{width:14px;height:14px;border-radius:4px;background:#f2c84b;box-shadow:0 0 0 4px rgba(242,200,75,.15)}
    h1{margin:0;font-size:26px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:980px){.grid{grid-template-columns:2.1fr 1fr}}
    .card{background:var(--card);border-radius:14px;padding:16px}
    .title{font-size:22px;margin:0 0 8px}
    .sub{color:var(--muted);font-size:14px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 8px}
    .chip{background:var(--chip);border-radius:999px;padding:6px 12px;font-size:13px;color:#c9d4e1;border:1px solid #273042}
    .chip.active{border-color:var(--brand);box-shadow:inset 0 0 0 1px rgba(246,196,69,.5)}
    .articles{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:700px){.articles{grid-template-columns:1fr 1fr}}
    .item{display:grid;grid-template-columns:120px 1fr;gap:12px;background:#0f141c;border:1px solid #1e2837;border-radius:12px;overflow:hidden}
    .thumb{background:#0b0f15;min-height:90px}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .meta{padding:10px 12px 12px}
    .kicker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
    .kicker .tag{font-size:11px;background:#162033;border:1px solid #243147;color:#b8c3d3;border-radius:999px;padding:3px 8px}
    .item a.titlelink{color:#cfe2ff;font-weight:600;line-height:1.25}
    .ago{color:#96a2b3;font-size:12px;margin-top:6px}
    .row{display:flex;flex-direction:column;gap:16px}
    .stat{background:#0f141c;border:1px solid #1e2837;border-radius:12px;padding:12px}
    .stat h3{margin:0 0 8px}
    .pair{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
    .pair a{font-weight:600}
    .small{font-size:12px;color:#97a3b5;margin-top:10px}
    .sched{display:flex;flex-direction:column;gap:10px}
    .game{background:#0f141c;border:1px solid #1e2837;border-radius:12px;padding:12px}
    .where{color:#aeb8c6;font-size:13px}
    .btns{display:flex;gap:8px;margin-top:6px}
    .btn{font-size:12px;padding:6px 10px;border-radius:8px;background:#162033;border:1px solid #243147;color:#cfe2ff}
    .diag{margin:6px 0 0;font-size:12px;color:#8ea0b6;display:none}
    .diag.err{color:#ff8b8b}
    footer{margin:24px 0;color:#93a1b3;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <header><div class="dot"></div><h1>Boilermakers Hub</h1></header>

    <div class="grid">
      <section class="card">
        <h2 class="title">Top Headlines</h2>
        <div class="sub">Refreshed every 30 min • Auto-updated via GitHub Actions</div>
        <div class="chips" id="filters">
          <button class="chip active" data-scope="all">all <span id="count-all" class="sub"></span></button>
          <button class="chip" data-scope="official">official <span id="count-official" class="sub"></span></button>
          <button class="chip" data-scope="insiders">insiders <span id="count-insiders" class="sub"></span></button>
          <button class="chip" data-scope="national">national <span id="count-national" class="sub"></span></button>
        </div>
        <div id="news-diag" class="diag"></div>
        <div id="articles" class="articles" aria-live="polite"></div>
      </section>

      <aside class="row">
        <section class="stat">
          <h3>Rankings</h3>
          <div id="rank-diag" class="diag"></div>
          <div class="pair">AP Top 25: <a id="ap-link" href="#" target="_blank" rel="noopener">—</a></div>
          <div class="pair">KenPom: <a id="kp-link" href="https://kenpom.com/" target="_blank" rel="noopener">—</a></div>
          <div id="rank-updated" class="small"></div>
        </section>

        <section class="stat">
          <h3>Upcoming Schedule</h3>
          <div id="sched-diag" class="diag"></div>
          <div id="schedule" class="sched"></div>
        </section>

        <section class="stat">
          <h3>Insider / Beat Links</h3>
          <div id="beat-diag" class="diag"></div>
          <div id="beats" class="sched"></div>
        </section>
      </aside>
    </div>

    <footer>© 2025 Boilermakers Hub • Auto-updated every 30 min</footer>
  </div>

  <script>
    const PATHS = {
      news:      'static/data/news.json',
      schedule:  'static/data/schedule.json',
      rankings:  'static/data/rankings.json',
      beats:     'static/data/beat_links.json'
    };

    const sel = (q, el=document)=>el.querySelector(q);
    const fmtAgo = iso => {
      if (!iso) return '';
      const t = new Date(iso);
      if (isNaN(t)) return '';
      const now = new Date();
      let diff = Math.floor((now - t) / 1000);
      if (diff < 0) diff = 0;
      const units = [['day',86400],['h',3600],['m',60]];
      for (const [label, sec] of units) {
        const v = Math.floor(diff / sec);
        if (v >= 1) return label==='day' ? `${v}d ago` : `${v}${label} ago`;
      }
      return 'just now';
    };
    const safeText = s => (s??'').toString();

    const showDiag = (id, ok, msg) => {
      const el = sel(id);
      if (!el) return;
      el.style.display = 'block';
      el.classList.toggle('err', !ok);
      el.textContent = msg;
    };

    // ----- NEWS -----
    let newsAll = [];
    const counts = { all: 0, official: 0, insiders: 0, national: 0 };

    const renderNews = (scope='all') => {
      const list = sel('#articles');
      list.innerHTML = '';
      if (!newsAll.length) {
        list.innerHTML = `<div class="sub">No Purdue Men's Basketball headlines right now. New stories will appear here automatically.</div>`;
        return;
      }
      const pick = scope==='all' ? newsAll : newsAll.filter(n => (n.section||'').toLowerCase()===scope);
      (pick.slice(0,10)).forEach(n => {
        const src = safeText(n.source);
        const title = safeText(n.title);
        const url = safeText(n.url);
        const when = fmtAgo(n.ts);
        const tagA = (n.section ? `<span class="tag">${safeText(n.section)}</span>`:'');
        const tagB = (src ? `<span class="tag">${src}</span>`:'');
        const img = n.image ? `<img src="${n.image}" loading="lazy" alt="">` : '';
        list.insertAdjacentHTML('beforeend', `
          <article class="item">
            <div class="thumb">${img || `<div class="thumb"></div>`}</div>
            <div class="meta">
              <div class="kicker">${tagA}${tagB}</div>
              <a class="titlelink" href="${url}" target="_blank" rel="noopener">${title}</a>
              <div class="ago">${when}${src?' • '+src:''}</div>
            </div>
          </article>
        `);
      });
      sel('#count-all').textContent = `(${counts.all})`;
      sel('#count-official').textContent = `(${counts.official})`;
      sel('#count-insiders').textContent = `(${counts.insiders})`;
      sel('#count-national').textContent = `(${counts.national})`;
    };

    const loadNews = async () => {
      try {
        const r = await fetch(PATHS.news, { cache:'no-store' });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const data = await r.json();
        if (!Array.isArray(data)) throw new Error('news.json is not an array');
        newsAll = data
          .filter(it => (it && it.title && it.url))
          .map(it => ({
            title: it.title,
            url: it.url,
            source: it.source || '',
            section: (it.section||'').toLowerCase(),
            image: it.image || null,
            ts: it.ts || it.date || it.published_at || null
          }))
          .sort((a,b)=> new Date(b.ts||0) - new Date(a.ts||0));
        counts.all = newsAll.length;
        counts.official = newsAll.filter(n=>n.section==='official').length;
        counts.insiders = newsAll.filter(n=>n.section==='insiders').length;
        counts.national = newsAll.filter(n=>n.section==='national').length;
        showDiag('#news-diag', true, `${PATHS.news} ✓ (${newsAll.length} items)`);
        renderNews('all');
      } catch (e) {
        showDiag('#news-diag', false, `${PATHS.news} ✗ ${e.message}`);
        newsAll = [];
        renderNews('all');
      }
    };

    // ----- RANKINGS -----
    const loadRankings = async () => {
      try {
        const r = await fetch(PATHS.rankings, { cache:'no-store' });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const j = await r.json();
        const ap = (j && j.ap!=null) ? j.ap : '—';
        const kp = (j && j.kenpom!=null) ? j.kenpom : '—';
        const updated = j && j.updated ? new Date(j.updated) : null;

        const apLink = j && j.ap_link ? j.ap_link : 'https://apnews.com/hub/ap-top-25-college-basketball-poll';
        const kpLink = j && j.kenpom_link ? j.kenpom_link : 'https://kenpom.com/';

        sel('#ap-link').textContent = ap;
        sel('#ap-link').href = apLink;

        sel('#kp-link').textContent = kp;
        sel('#kp-link').href = kpLink;

        sel('#rank-updated').textContent = updated ? `Updated ${updated.toLocaleString()}` : '';
        showDiag('#rank-diag', true, `${PATHS.rankings} ✓`);
      } catch (e) {
        showDiag('#rank-diag', false, `${PATHS.rankings} ✗ ${e.message}`);
      }
    };

    // ----- SCHEDULE (tolerant to both shapes) -----
    const loadSchedule = async () => {
      const box = sel('#schedule');
      box.innerHTML = '';
      try {
        const r = await fetch(PATHS.schedule, { cache:'no-store' });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const raw = await r.json();

        // Accept array OR { games: [...] }
        const arr = Array.isArray(raw) ? raw : (Array.isArray(raw?.games) ? raw.games : []);
        // Normalize fields from either schema:
        const upcoming = arr
          .map(g => {
            const tip =
              g.tip || g.ts || g.date_iso || g.iso_local || null;
            const dt = tip ? new Date(tip) : null;
            return {
              opponent: g.opponent || g.name || 'TBD',
              site: g.site || (g.homeAway ? (g.homeAway.toLowerCase()==='home'?'Home':(g.homeAway.toLowerCase()==='away'?'Away':'Neutral')) : 'Neutral'),
              when: dt,
              whenText: g.date_local || (dt ? dt.toLocaleString() + ' (local)' : 'TBD'),
              venue: g.venue || '',
              city_state: g.city_state || [g.city, g.state].filter(Boolean).join(', '),
              url: g.url || g.link || ''
            };
          })
          .filter(g => g.when && (new Date(g.when) >= new Date()))
          .sort((a,b)=> a.when - b.when)
          .slice(0,5);

        if (!upcoming.length) {
          box.innerHTML = `<div class="sub">No upcoming games found. <a href="https://purduesports.com/sports/mens-basketball/schedule" target="_blank" rel="noopener">Check official schedule ↗</a></div>`;
        } else {
          upcoming.forEach(g=>{
            box.insertAdjacentHTML('beforeend', `
              <div class="game">
                <div style="font-weight:700">${safeText(g.opponent)}</div>
                <div class="where">${safeText(g.site)}</div>
                <div class="where">${safeText(g.whenText)}</div>
                <div class="where">${[g.venue, g.city_state].filter(Boolean).join(' — ')}</div>
                <div class="btns">
                  ${g.url ? `<a class="btn" target="_blank" rel="noopener" href="${g.url}">Game details ↗</a>` : ``}
                </div>
              </div>
            `);
          });
        }
        showDiag('#sched-diag', true, `${PATHS.schedule} ✓`);
      } catch (e) {
        showDiag('#sched-diag', false, `${PATHS.schedule} ✗ ${e.message}`);
        box.innerHTML = `<div class="sub">No upcoming games found. <a href="https://purduesports.com/sports/mens-basketball/schedule" target="_blank" rel="noopener">Check official schedule ↗</a></div>`;
      }
    };

    // ----- BEATS (tolerant to array OR {links:[]}) -----
    const loadBeats = async () => {
      const box = sel('#beats');
      box.innerHTML = '';
      try {
        const r = await fetch(PATHS.beats, { cache:'no-store' });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const j = await r.json();
        const arr = Array.isArray(j) ? j : (Array.isArray(j?.links) ? j.links : []);
        if (!arr.length) {
          box.innerHTML = `<div class="sub">No insider items (yet).</div>`;
        } else {
          arr.slice(0,6).forEach(b=>{
            const title = b.title || b.name || b.text || 'Link';
            const url = b.url || b.href || '#';
            box.insertAdjacentHTML('beforeend', `
              <div class="game">
                <a href="${url}" target="_blank" rel="noopener">${safeText(title)}</a>
              </div>
            `);
          });
        }
        showDiag('#beat-diag', true, `${PATHS.beats} ✓`);
      } catch (e) {
        showDiag('#beat-diag', false, `${PATHS.beats} ✗ ${e.message}`);
        box.innerHTML = `<div class="sub">No insider items (yet).</div>`;
      }
    };

    // Filters
    document.getElementById('filters').addEventListener('click', e=>{
      const btn = e.target.closest('button[data-scope]');
      if (!btn) return;
      document.querySelectorAll('#filters .chip').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      renderNews(btn.dataset.scope);
    });

    // Kickoff
    loadNews();
    loadRankings();
    loadSchedule();
    loadBeats();
  </script>
</body>
</html>
