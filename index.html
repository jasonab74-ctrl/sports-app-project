<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sports App Project — Team Hub</title>

  <meta name="theme-color" content="#0b0f14" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="static/icons/favicon.svg" type="image/svg+xml"/>

  <!-- INLINE CRITICAL CSS (restores full styling even if external CSS path is wrong) -->
  <style>
  :root{
    --bg:#0b0f14;
    --card:#121722;
    --text:#eef2f7;
    --muted:#a2adc2;
    --accent:#cfb991;
    --accent-2:#1c1f26;
    --chip:#18202c;
    --border:#101827;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji"}

  /* Header */
  .app-header{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:.75rem;padding:.65rem .95rem;background:linear-gradient(180deg,#0b0f14 0%,#0b0f14e6 60%,transparent 100%);border-bottom:1px solid #0e1420}
  .pill-btn{padding:.45rem .85rem;border-radius:999px;background:var(--accent);color:#111;border:0;font-weight:700;cursor:pointer}
  .team-logo{width:28px;height:28px;border-radius:6px;object-fit:contain;background:#111;padding:2px}
  #site-title{font-size:18px;margin:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Tabs */
  .tabs{display:flex;gap:.5rem;overflow:auto;padding:.6rem .9rem .8rem;border-bottom:1px solid #101624}
  .chip{border:1px solid #1d2738;background:var(--chip);color:var(--text);padding:.5rem .9rem;border-radius:999px;cursor:pointer;white-space:nowrap}
  .chip.active{background:var(--accent);color:#111;border-color:transparent;font-weight:700}

  /* Ticker */
  .ticker{position:relative;overflow:hidden;border-bottom:1px solid #101624;background:#0c111a}
  .ticker.hidden{display:none}
  .ticker__track{display:flex;gap:1.4rem;white-space:nowrap;will-change:transform;padding:.35rem .75rem;opacity:.8}
  .ticker a{color:var(--muted);text-decoration:none}
  @keyframes marquee{from{transform:translateX(0)} to{transform:translateX(-50%)}}

  /* Layout */
  #content{padding:1rem;display:grid;gap:1rem;grid-template-columns:1fr;max-width:1200px;margin:0 auto}
  @media(min-width:980px){#content{grid-template-columns:minmax(0,1fr) 380px}}
  h2{margin:0 0 .6rem 0}
  .tab{display:none}
  .tab.visible{display:block}
  .grid{display:grid;gap:12px;grid-template-columns:1fr}
  @media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}

  /* Cards */
  a.card{color:inherit;text-decoration:none}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;min-height:100%;transition:transform .18s ease,box-shadow .18s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.25)}
  .card__thumb{position:relative;aspect-ratio:16/9;background:#0b111a}
  .card__thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .card__thumb.placeholder::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,#0f1726 0 12px,#152234 12px 24px);opacity:.9}
  .card__body{padding:.85rem}
  .card__kicker{color:var(--accent);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .card__title{margin:.25rem 0;font-size:1.05rem;line-height:1.25;font-weight:750;max-width:60ch}
  .card__meta{color:var(--muted);font-size:.82rem}
  .carousel{display:flex;gap:.75rem;overflow:auto;scroll-snap-type:x mandatory;padding-bottom:.25rem;margin-bottom:.6rem}
  .carousel .card{min-width:86%;scroll-snap-align:start}
  @media(min-width:980px){.carousel .card{min-width:55%}}

  /* Widgets */
  .sidebar{display:grid;gap:1rem}
  .widget{background:#0e1522;border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .widget h3{margin:0;padding:.9rem 1rem;background:#0c1220;border-bottom:1px solid var(--border)}
  .widget-body{padding:1rem}
  .list{list-style:none;margin:0;padding:0}
  .list li{display:flex;justify-content:space-between;gap:.75rem;padding:.55rem 0;border-bottom:1px dotted #172035}
  .list li:last-child{border-bottom:0}

  /* Skeletons */
  .skel{background:linear-gradient(90deg,#0f1726 25%,#132036 37%,#0f1726 63%);background-size:400% 100%;animation:shimmer 1.2s infinite;border-radius:10px}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
  .skel.card{height:220px;border-radius:16px}
  .empty{color:var(--muted);font-size:.95rem;padding:1rem}

  /* A11y focus */
  .chip:focus-visible, a.card:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

  /* Footer */
  .app-footer{padding:2rem 1rem;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  <header class="app-header">
    <img id="team-logo" class="team-logo" alt="Team Logo" src="" />
    <h1 id="site-title">Team Hub</h1>
    <button id="refresh" class="pill-btn" aria-label="Refresh">Refresh</button>
  </header>

  <nav class="tabs" aria-label="Sections">
    <button class="chip active" data-tab="news">News</button>
    <button class="chip" data-tab="videos">Videos</button>
    <button class="chip" data-tab="rankings">Rankings</button>
    <button class="chip" data-tab="schedule">Schedule</button>
    <button class="chip" data-tab="nil">NIL</button>
    <button class="chip" data-tab="insider">Insider</button>
  </nav>

  <section id="ticker" class="ticker" aria-label="Top headlines">
    <div class="ticker__track" id="ticker-track"></div>
  </section>

  <main id="content">
    <section id="news" class="tab visible" tabindex="-1">
      <h2>Latest Headlines</h2>
      <div id="carousel" class="carousel" aria-label="Headline carousel"></div>
      <div id="news-grid" class="grid"></div>
    </section>

    <section id="videos" class="tab" tabindex="-1">
      <h2>Latest Videos</h2>
      <div id="video-grid" class="grid"></div>
    </section>

    <aside class="sidebar">
      <section id="rankings" class="widget">
        <h3>Rankings & Analytics</h3>
        <div id="rankings-body" class="widget-body"></div>
      </section>

      <section id="schedule" class="widget">
        <h3>Schedule</h3>
        <div id="schedule-body" class="widget-body"></div>
      </section>

      <section id="nil" class="widget">
        <h3>NIL Leaderboard</h3>
        <div id="nil-body" class="widget-body"></div>
      </section>

      <section id="insider" class="widget">
        <h3>Insider & Beat Writers</h3>
        <div id="insider-body" class="widget-body"></div>
      </section>
    </aside>
  </main>

  <footer class="app-footer">
    <small>Sports App Project • JSON-driven • Auto-updating</small>
  </footer>

  <!-- INLINE APP JS (restores full behavior even if external JS path is wrong) -->
  <script>
  const qs=(s,el=document)=>el.querySelector(s);
  const qsa=(s,el=document)=>[...el.querySelectorAll(s)];
  const state={teamSlug:new URL(location.href).searchParams.get('team')||'purdue-mbb'};
  const paths={team:'static/team.json',items:(slug)=>`static/teams/${slug}/items.json`,widgets:'static/widgets.json',schedule:'static/schedule.json'};
  function decodeEntities(str){if(!str)return'';const t=document.createElement('textarea');t.innerHTML=str;return t.value;}
  function html(str){const d=document.createElement('div');d.innerHTML=str.trim();return d.firstChild;}
  function safeJSON(url){return fetch(url,{cache:'no-store'}).then(r=>r.ok?r.json():{}).catch(()=>({}));}

  function initTabs(){
    qsa('.tabs .chip').forEach(btn=>{
      btn.addEventListener('click',()=>{
        qsa('.tabs .chip').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const tab=btn.dataset.tab;
        qsa('.tab').forEach(sec=>sec.classList.remove('visible'));
        const active=qs('#'+tab); active.classList.add('visible'); active.setAttribute('aria-live','polite'); active.focus({preventScroll:true});
      });
    });
  }

  function renderTicker(items){
    const ticker=qs('#ticker'); const track=qs('#ticker-track');
    const list=(items||[]).filter(i=>i.url&&i.title).slice(0,16).map(i=>`<a href="\${i.url}" target="_blank" rel="noopener">\${decodeEntities(i.title)}</a>`);
    if(list.length<3){ticker.classList.add('hidden');return;}
    ticker.classList.remove('hidden'); track.innerHTML=[...list,...list].join(' • ');
    const totalWidth=track.scrollWidth/2; const dur=Math.max(22,Math.min(55,Math.round(totalWidth/32)));
    track.style.animation=\`marquee \${dur}s linear infinite\`;
  }

  const FALLBACK_SVG=encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#101726" offset="0"/><stop stop-color="#0d1423" offset="1"/></linearGradient></defs><rect fill="url(#g)" width="1200" height="675"/><text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" fill="#415070" font-family="system-ui,Segoe UI,Roboto" font-size="42">Sports App Project</text></svg>');

  function makeCard(item){
    const a=document.createElement('a'); a.className='card'; a.href=item.url||'#'; a.target='_blank'; a.rel='noopener';
    const thumb=html('<div class="card__thumb"><img loading="lazy" alt=""></div>');
    const img=thumb.querySelector('img');
    const src=item.image||item.thumbnail||\`data:image/svg+xml;charset=utf-8,\${FALLBACK_SVG}\`;
    if(!item.image&&!item.thumbnail) thumb.classList.add('placeholder');
    img.src=src; img.alt=decodeEntities(item.title||'');
    const body=html('<div class="card__body"><div class="card__kicker"></div><div class="card__title"></div><div class="card__meta"></div></div>');
    body.querySelector('.card__kicker').textContent=item.tag||(item.is_video?'Video':'News');
    body.querySelector('.card__title').textContent=decodeEntities(item.title||'');
    const d=item.date?new Date(item.date):null; const datestr=d?d.toLocaleDateString(undefined,{month:'short',day:'numeric'}):'';
    body.querySelector('.card__meta').textContent=[item.source||'',datestr].filter(Boolean).join(' • ');
    a.append(thumb,body); return a;
  }

  function renderCarousel(items){const el=qs('#carousel');el.innerHTML='';items.slice(0,8).forEach(i=>el.appendChild(makeCard(i)));}

  function renderGrid(items,sel){
    const grid=qs(sel); grid.innerHTML='';
    if(!items.length){grid.innerHTML='<div class="empty">No items yet — add feeds in <code>static/sources.json</code> and the Action will populate this automatically.</div>';return;}
    items.slice(0,24).forEach(i=>grid.appendChild(makeCard(i)));
  }

  function renderRankings(w){
    const el=qs('#rankings-body'); el.innerHTML='';
    const rows=[['AP Rank',w?.ap_rank??'—'],['KenPom',w?.kenpom??'—'],['NET',w?.net??'—']];
    const ul=document.createElement('ul'); ul.className='list';
    rows.forEach(([k,v])=>{const li=document.createElement('li'); li.innerHTML=\`<span>\${k}</span><strong>\${v}</strong>\`; ul.appendChild(li);});
    el.appendChild(ul);
  }

  function renderSchedule(sch){
    const el=qs('#schedule-body'); el.innerHTML='';
    const games=sch?.games||[]; const now=new Date();
    const upcoming=games.filter(g=>new Date(g.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,6);
    if(!upcoming.length){el.innerHTML='<div class="empty">No upcoming games.</div>';return;}
    const ul=document.createElement('ul'); ul.className='list';
    upcoming.forEach(g=>{const d=new Date(g.date); const left=\`\${d.toLocaleDateString(undefined,{month:'short',day:'numeric'})} • \${g.opponent}\`; const right=g.venue||(g.home?'Home':'Away'); const li=document.createElement('li'); li.innerHTML=\`<span>\${left}</span><span>\${right}</span>\`; ul.appendChild(li);});
    el.appendChild(ul);
  }

  function renderNIL(w){
    const el=qs('#nil-body'); el.innerHTML='';
    const list=w?.nil||[];
    if(!list.length){el.innerHTML='<div class="empty">NIL data not available.</div>';return;}
    const ul=document.createElement('ul'); ul.className='list';
    list.slice(0,5).forEach(p=>{const li=document.createElement('li'); li.innerHTML=\`<span>\${p.name}</span><span>\${p.value}</span>\`; ul.appendChild(li);});
    el.appendChild(ul);
  }

  function renderInsider(w){
    const el=qs('#insider-body'); el.innerHTML='';
    const links=w?.insider||[];
    if(!links.length){el.innerHTML='\
<div class="empty">Add insider links in <code>static/widgets.json</code>.</div>';return;}
    const ul=document.createElement('ul'); ul.className='list';
    links.forEach(l=>{const li=document.createElement('li'); li.innerHTML=\`<a href="\${l.url}" target="_blank" rel="noopener">\${l.name}</a><span>\${l.note||''}</span>\`; ul.appendChild(li);});
    el.appendChild(ul);
  }

  const none=v=>v==null||v===''||v==='—';
  const show=(el,ok)=>el.closest('.widget').style.display=ok?'':'none';

  async function boot(){
    initTabs();

    // skeletons (quick)
    qs('#carousel').innerHTML='<div class="skel card"></div>';
    qs('#news-grid').innerHTML='<div class="skel card"></div><div class="skel card"></div>';
    qs('#video-grid').innerHTML='<div class="skel card"></div><div class="skel card"></div>';

    try{
      const teamCfg=await safeJSON(paths.team).then(t=>t.teams?.[state.teamSlug]||Object.values(t.teams||{})[0]||{name:'Team Hub',logo:'',colors:{accent:'#cfb991',bg:'#0b0f14',card:'#121722'}});
      document.title=\`\${teamCfg.name} — Team Hub\`;
      qs('#site-title').textContent=teamCfg.name;
      if(teamCfg.logo) qs('#team-logo').src=teamCfg.logo;
      document.documentElement.style.setProperty('--accent',teamCfg.colors.accent);
      document.documentElement.style.setProperty('--bg',teamCfg.colors.bg);
      document.documentElement.style.setProperty('--card',teamCfg.colors.card);

      const [itemsJson,widgetsAll,scheduleAll]=await Promise.all([
        safeJSON(paths.items(state.teamSlug)),
        safeJSON(paths.widgets),
        safeJSON(paths.schedule)
      ]);

      let items=(itemsJson.items||[]).map(i=>({...i,title:decodeEntities(i.title)}));
      if(!items.length){
        items=[{title:'Welcome to your Team Hub — connect feeds to populate live content',url:'#',image:'',thumbnail:'',source:'Sports App Project',date:new Date().toISOString(),tag:'News',is_video:false}];
      }
      const widgets=widgetsAll[state.teamSlug]||widgetsAll.default||{};
      const schedule=scheduleAll[state.teamSlug]||scheduleAll;

      const news=items.filter(i=>!i.is_video);
      const vids=items.filter(i=>i.is_video);

      renderTicker(items);
      renderCarousel(news.length?news:items);
      renderGrid(news.length?news:items,'#news-grid');
      renderGrid(vids,'#video-grid');
      renderRankings(widgets);
      renderSchedule(schedule);
      renderNIL(widgets);
      renderInsider(widgets);

      // Hide empty widgets
      show(qs('#rankings-body'), !(none(widgets?.ap_rank)&&none(widgets?.kenpom)&&none(widgets?.net)));
      show(qs('#schedule-body'), (schedule?.games||[]).length>0);
      show(qs('#nil-body'), (widgets?.nil||[]).length>0);
      show(qs('#insider-body'), (widgets?.insider||[]).length>0);
    }catch(err){
      console.error(err);
      qs('#news-grid').innerHTML='<div class="empty">Couldn’t load data. Check your JSON paths and try again.</div>';
    }

    qs('#refresh').addEventListener('click',()=>location.reload());
  }
  document.addEventListener('DOMContentLoaded',boot);
  </script>

  <!-- Optional: if/when external assets are fixed, you can re-enable these two lines:
  <link rel="stylesheet" href="static/css/pro.css" />
  <script src="static/js/pro.js" defer></script>
  -->
</body>
</html>
