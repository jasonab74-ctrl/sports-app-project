<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Boilermakers Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
  <header>
    <h1>Boilermakers Hub</h1>
    <nav>
      <a href="/" aria-label="home">Home</a>
      <a href="#" class="active" aria-label="news">News</a>
      <a href="#" aria-label="rankings">Rankings</a>
      <a href="#" aria-label="schedule">Schedule</a>
      <a href="#" aria-label="roster">Roster</a>
      <a href="#" aria-label="videos">Videos</a>
    </nav>
  </header>
  <main>
    <section id="top-headlines">
      <h2>Top Headlines</h2>
      <p class="meta">Refreshed every 30 min • Auto‑updated via GitHub Actions</p>
      <div id="filter-buttons">
        <button data-filter="all" class="active">all</button>
        <button data-filter="official">official</button>
        <button data-filter="insiders">insiders</button>
        <button data-filter="national">national</button>
      </div>
      <ul id="headlines-list"></ul>
    </section>

    <aside id="rankings">
      <h2>Rankings</h2>
      <p><a href="https://apnews.com/hub/ap-top-25-college-basketball-poll" target="_blank">AP Top 25:</a> <span id="ap-rank">—</span></p>
      <p><a href="https://kenpom.com" target="_blank">KenPom:</a> <span id="kenpom-rank">—</span></p>
    </aside>

    <aside id="schedule">
      <h2>Upcoming Schedule</h2>
      <ul id="schedule-list"></ul>
    </aside>

    <aside id="insider-links">
      <h2>Insider / Beat Links</h2>
      <ul id="beat-links"></ul>
    </aside>
  </main>
  <footer>
    <p>&copy; 2025 Boilermakers Hub • Auto‑updated every 30 min</p>
  </footer>

  <script>
    /* Fetch latest news from static JSON */
    async function fetchNews() {
      const categories = {
        all: 'static/data/news.json',
        official: 'static/data/news_official.json',
        insiders: 'static/data/news_insiders.json',
        national: 'static/data/news_national.json'
      };
      const buttons = document.querySelectorAll('#filter-buttons button');
      buttons.forEach(button => {
        button.addEventListener('click', async () => {
          buttons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          const key = button.getAttribute('data-filter');
          const url = categories[key];
          const data = await (await fetch(url)).json();
          renderNews(data.slice(0, 10));
        });
      });
      // Load default (all) on first load:
      const defaultData = await (await fetch(categories.all)).json();
      renderNews(defaultData.slice(0, 10));
    }

    function renderNews(articles) {
      const list = document.getElementById('headlines-list');
      list.innerHTML = '';
      articles.forEach(item => {
        const li = document.createElement('li');
        li.className = 'headline-item';
        li.innerHTML = `
          <article>
            ${item.image ? `<img src="${item.image}" alt="${item.title} image">` : ''}
            <div class="headline-meta">
              <span class="tag">${item.tag}</span>
              <span class="source">${item.source}</span>
            </div>
            <h3><a href="${item.url}" target="_blank">${item.title}</a></h3>
            <p class="time">${item.published} ago</p>
          </article>
        `;
        list.appendChild(li);
      });
    }

    /* Fetch schedule from static JSON and show next 5 games */
    async function fetchSchedule() {
      const url = 'static/teams/purdue-mbb/schedule.json';
      const data = await (await fetch(url)).json();
      const upcoming = data.filter(game => {
        const gameDate = new Date(game.date);
        return gameDate >= new Date();
      }).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 5);
      const list = document.getElementById('schedule-list');
      list.innerHTML = '';
      upcoming.forEach(game => {
        const li = document.createElement('li');
        li.innerHTML = `
          <strong>${game.opponent}</strong>
          <span class="site">${game.location}</span>
          <span class="date">${new Date(game.date).toLocaleDateString()}</span>
          <span class="time">${game.time} local</span>
        `;
        list.appendChild(li);
      });
    }

    /* Fetch ranking data from static config JSON */
    async function fetchRankings() {
      try {
        const config = await (await fetch('static/data/config.json')).json();
        const apRank = config.apRank || '—';
        const kenpomRank = config.kenpomRank || '—';
        document.getElementById('ap-rank').textContent = apRank;
        document.getElementById('kenpom-rank').textContent = kenpomRank;
      } catch {
        document.getElementById('ap-rank').textContent = '—';
        document.getElementById('kenpom-rank').textContent = '—';
      }
    }

    /* Fetch some beat/insider links (manually curated list) */
    async function fetchBeatLinks() {
      try {
        const data = await (await fetch('static/data/beat_links.json')).json();
        const list = document.getElementById('beat-links');
        list.innerHTML = '';
        data.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${item.url}" target="_blank">${item.title}</a>`;
          list.appendChild(li);
        });
      } catch {
        document.getElementById('beat-links').innerHTML = '<li>No insider items (yet).</li>';
      }
    }

    // Initialize all fetches on load
    fetchNews();
    fetchSchedule();
    fetchRankings();
    fetchBeatLinks();
  </script>
</body>
</html>
