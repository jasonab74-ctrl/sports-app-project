<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boilermakers Hub • Purdue MBB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%23f4d03f'/%3E%3C/svg%3E">
  <style>
    :root{
      --bg:#0c1014;--panel:#131922;--card:#0f141a;--text:#e8eef5;--muted:#a8b3c0;
      --gold:#f2c94c;--chip:#1a2230;--ok:#21d07a;--warn:#f2994a;--err:#eb5757;
      --ring: rgba(242,201,76,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:radial-gradient(1200px 800px at 20% -10%,#111826 0%,#0b1016 55%,#06090d 100%);color:var(--text);font:400 16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial}
    a{color:#9fc7ff;text-decoration:none}
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
    header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .dot{width:14px;height:14px;border-radius:6px;background:var(--gold);box-shadow:0 0 0 6px var(--ring)}
    h1{font-size:28px;margin:0}
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:980px){.grid{grid-template-columns:2fr 1fr}}
    .panel{background:var(--panel);border-radius:14px;padding:16px;box-shadow:0 10px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.04)}
    h2{margin:0 0 12px;font-size:24px}
    .sub{color:var(--muted);font-size:14px;margin-bottom:12px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}
    .chip{padding:8px 14px;border-radius:999px;background:var(--chip);border:1px solid rgba(255,255,255,.06);color:var(--text);font-weight:500}
    .chip.active{outline:2px solid var(--ring);background:rgba(242,201,76,.08)}
    .news{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:720px){.news{grid-template-columns:1fr 1fr}}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
    .thumb{position:relative;aspect-ratio:16/9;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02))}
    .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .meta{padding:12px 14px 2px;display:flex;gap:8px;flex-wrap:wrap}
    .badge{font:600 12px/1 system-ui; padding:6px 10px;border-radius:999px;background:#1b2433;color:#c7d3e4;border:1px solid rgba(255,255,255,.06)}
    .content{padding:8px 14px 14px}
    .title{font-weight:700;font-size:18px;margin:0 0 6px}
    .muted{color:var(--muted);font-size:13px}
    .rows{display:flex;flex-direction:column;gap:10px}
    .row{border:1px solid rgba(255,255,255,.06);background:var(--card);border-radius:12px;padding:12px 14px}
    .row b{display:block;margin-bottom:4px}
    .row small{color:var(--muted)}
    .footer{margin-top:10px;color:var(--muted);font-size:13px}
    .linkish{color:#cfe2ff;text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="dot"></div>
      <h1>Boilermakers Hub</h1>
    </header>

    <div class="grid">
      <section class="panel" id="news-panel">
        <h2>Top Headlines</h2>
        <div class="sub">Refreshed every 30 min • Auto-updated via GitHub Actions</div>
        <div class="chips" id="filters">
          <button class="chip active" data-scope="all">all <span id="count-all" class="muted"></span></button>
          <button class="chip" data-scope="official">official <span id="count-official" class="muted"></span></button>
          <button class="chip" data-scope="insiders">insiders <span id="count-insiders" class="muted"></span></button>
          <button class="chip" data-scope="national">national <span id="count-national" class="muted"></span></button>
        </div>
        <div class="news" id="news"></div>
      </section>

      <aside class="panel">
        <h2>Rankings</h2>
        <div class="rows" id="rankings">
          <div class="row"><b>AP Top 25:</b><span id="ap-rank">—</span>
            <small> • <a class="linkish" href="https://apnews.com/hub/ap-top-25-college-basketball-poll" target="_blank" rel="noopener">AP source</a></small>
          </div>
          <div class="row"><b>KenPom:</b><span id="kp-rank">—</span>
            <small> • <a class="linkish" href="https://kenpom.com/" target="_blank" rel="noopener">kenpom.com</a></small>
          </div>
          <div class="footer" id="rk-updated"></div>
        </div>

        <h2 style="margin-top:18px">Upcoming Schedule</h2>
        <div class="rows" id="schedule"></div>

        <h2 style="margin-top:18px">Insider / Beat Links</h2>
        <div class="rows" id="beat"></div>
      </aside>
    </div>

    <div class="footer">© 2025 Boilermakers Hub • Auto-updated every 30 min</div>
  </div>

  <script>
    // ---------- Utilities ----------
    const byId = (id)=>document.getElementById(id);
    const newsEl = byId('news');
    const counts = {
      all: byId('count-all'),
      official: byId('count-official'),
      insiders: byId('count-insiders'),
      national: byId('count-national')
    };

    // Robust time-ago (ISO string or epoch; clamps negatives)
    function timeAgo(input) {
      let then;
      if (typeof input === 'number') {
        then = new Date(input > 1e12 ? input : input * 1000); // sec vs ms
      } else {
        then = new Date(input);
      }
      const diffMs = Math.max(0, Date.now() - (then.getTime() || 0));
      const mins = Math.floor(diffMs / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    // Safe image proxy to avoid hotlink/CORS blocks
    function prox(url) {
      if (!url) return null;
      try {
        const stripped = String(url).replace(/^https?:\/\//,'');
        return `https://images.weserv.nl/?url=${encodeURIComponent(stripped)}&w=1200&h=630&fit=cover&we=1`;
      } catch { return null; }
    }

    function fmtLocal(dt) {
      const d = new Date(dt);
      if (isNaN(d)) return '';
      return d.toLocaleString(undefined, { hour:'numeric', minute:'2-digit', month:'numeric', day:'numeric', year:'numeric' }) + ' local';
    }

    // ---------- Data paths ----------
    const PATHS = {
      news: 'static/teams/purdue-mbb/news.json',
      schedule: 'static/teams/purdue-mbb/schedule.json',
      rankings: 'static/data/rankings.json',
      rankingsOverrides: 'static/data/rankings_overrides.json', // optional
      beat: 'static/data/beat_links.json'
    };

    async function getJSON(path) {
      const res = await fetch(path, { cache:'no-store' });
      if (!res.ok) throw new Error(`${path}: ${res.status}`);
      return res.json();
    }

    // ---------- Render News ----------
    let NEWS_RAW = [];
    let FILTER = 'all';

    function tagBadge(t){ return `<span class="badge">${t}</span>` }

    function renderNews() {
      const data = NEWS_RAW.slice(0, 10);
      counts.all.textContent = ` (${data.length})`;
      counts.official.textContent = ` (${data.filter(x=>x.section==='official').length})`;
      counts.insiders.textContent = ` (${data.filter(x=>x.section==='insiders').length})`;
      counts.national.textContent = ` (${data.filter(x=>x.section==='national').length})`;

      const list = (FILTER==='all') ? data : data.filter(x => x.section === FILTER);
      newsEl.innerHTML = list.map(item => {
        const img = prox(item.image || item.ogImage || item.thumbnail);
        const source = item.source || '';
        const when = timeAgo(item.publishedAt || item.date || item.timestamp);
        const chips = [
          item.section ? tagBadge(item.section) : '',
          source ? tagBadge(source) : ''
        ].join('');

        return `
        <article class="card">
          <div class="thumb">${img ? `<img loading="lazy" referrerpolicy="no-referrer" src="${img}" alt="">` : ''}</div>
          <div class="meta">${chips}</div>
          <div class="content">
            <a class="title" href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
            <div class="muted">${when}${source ? ` • ${source}`:''}</div>
          </div>
        </article>`;
      }).join('') || `<div class="muted">No Purdue Men's Basketball headlines right now. New stories will appear here automatically.</div>`;
    }

    // ---------- Render Schedule ----------
    function renderSchedule(items) {
      const host = byId('schedule');
      if (!items?.length){
        host.innerHTML = `<div class="muted">No upcoming games found. <a class="linkish" href="https://purduesports.com/sports/mens-basketball/schedule" target="_blank" rel="noopener">Check official schedule ↗</a></div>`;
        return;
      }
      host.innerHTML = items.slice(0,5).map(g=>{
        const bits = [
          g.locationText || g.venue ? `Location: ${g.venue || g.locationText}` : '',
          g.url ? `<a class="linkish" href="${g.url}" target="_blank" rel="noopener">Game details ↗</a>` : ''
        ].filter(Boolean).join('<br/>');

        return `<div class="row">
          <b>${g.opponent || 'TBD'}${g.isExhibition ? ' (Exhibition)':''}</b>
          <small>${g.site || g.siteText || ''}</small><br/>
          <small>${fmtLocal(g.start)}</small><br/>
          <small>${bits}</small>
        </div>`;
      }).join('');
    }

    // ---------- Rankings (with optional overrides precedence) ----------
    function renderRankings(obj) {
      const ap = obj?.apTop25 ?? '—';
      const kp = obj?.kenpom ?? '—';
      byId('ap-rank').textContent = ap;
      byId('kp-rank').textContent = kp;

      const updated = obj?.updatedAt ? new Date(obj.updatedAt) : null;
      byId('rk-updated').textContent = updated && !isNaN(updated) ?
        `Updated ${updated.toLocaleString()}` : '';
    }

    async function loadRankingsWithOverride() {
      let base = {};
      let override = null;

      try { base = await getJSON(PATHS.rankings); } catch(e){ console.warn('rankings base fetch failed', e); }
      try { override = await getJSON(PATHS.rankingsOverrides); } catch(e){ /* 404 is fine */ }

      if (override && override.updatedAt) {
        const tO = new Date(override.updatedAt).getTime();
        const tB = new Date(base.updatedAt || 0).getTime();
        if (!isNaN(tO) && (isNaN(tB) || tO > tB)) {
          renderRankings(override);
          return;
        }
      }
      renderRankings(base);
    }

    // ---------- Render Beat ----------
    function renderBeat(list){
      const host = byId('beat');
      if (!list?.length){ host.innerHTML = `<div class="muted">No insider items (yet).</div>`; return; }
      host.innerHTML = list.slice(0,5).map(x=>`<div class="row"><a href="${x.url}" target="_blank" rel="noopener">${x.title}</a><br/><small>${x.source || ''}</small></div>`).join('');
    }

    // ---------- Load all ----------
    (async function init(){
      // Filters
      document.querySelectorAll('#filters .chip').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          document.querySelectorAll('#filters .chip').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          FILTER = btn.dataset.scope;
          renderNews();
        });
      });

      try {
        const news = await getJSON(PATHS.news);
        NEWS_RAW = (news || []).map(n=>({
          title: n.title || n.headline || '',
          url: n.url || n.link,
          image: n.image || n.imageUrl || n.ogImage || n.thumbnail,
          source: n.source || n.publisher,
          section: n.section || n.tag || 'national',
          publishedAt: n.publishedAt || n.date || n.timestamp
        }));
        renderNews();
      } catch(e){
        newsEl.innerHTML = `<div class="muted">Could not load headlines.</div>`;
        console.error(e);
      }

      try{
        const sched = await getJSON(PATHS.schedule);
        renderSchedule(sched?.games || sched || []);
      }catch(e){
        byId('schedule').innerHTML = `<div class="muted">Could not load schedule.</div>`;
        console.error(e);
      }

      try{
        await loadRankingsWithOverride();
      }catch(e){
        renderRankings({});
        console.error(e);
      }

      try{
        const b = await getJSON(PATHS.beat);
        renderBeat(b || []);
      }catch(e){
        renderBeat([]);
        console.error(e);
      }
    })();
  </script>
</body>
</html>
