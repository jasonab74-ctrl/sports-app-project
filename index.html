<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  />
  <title>Purdue Boilermakers • Men's Basketball Hub</title>

  <!-- Your dark site stylesheet (can stay) -->
  <link rel="stylesheet" href="static/css/pro.css"/>

  <meta name="theme-color" content="#1a1b1e"/>
  <meta name="description" content="Top Purdue Boilermakers Men's Basketball headlines from trusted sources. Updated automatically.">

  <!-- HARD OVERRIDES so page is never 'just a black screen' -->
  <style>
    /* page shell defaults */
    body {
      background-color: #1a1b1e;
      color: #e8eaed;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .site-header {
      background: #1f2022;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 12px 16px;
    }

    .site-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1280px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .brand-icon .brand-mark {
      width: 20px;
      height: 20px;
      border-left: 6px solid #d4c27b;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      display: inline-block;
      border-radius: 2px;
      margin-top: 4px;
    }

    .brand-text .team-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      color: #f7f7f2;
    }

    .brand-text .team-sub {
      font-size: 0.8rem;
      line-height: 1.2;
      color: rgba(255,255,255,0.6);
    }

    /* hamburger button */
    .hamburger {
      background: #2a2b2f;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-width: 40px;
      min-height: 40px;
      color: #f7f7f2;
    }
    .hamburger span {
      display: block;
      height: 2px;
      width: 18px;
      background: #e8eaed;
      border-radius: 1px;
    }

    /* NAV OVERLAY FIX:
       The old CSS might make #nav a fullscreen overlay by default.
       We shut that down here so it cannot cover everything. */
    #nav.main-nav {
      display: none !important;
      position: static !important;
      background: transparent !important;
      color: inherit !important;
    }

    #nav.main-nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #nav.main-nav li a {
      color: #e8eaed;
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* content wrapper */
    .content-wrap {
      max-width: 1280px;
      margin: 16px auto 80px auto;
      padding: 0 16px 64px;
    }

    /* panel header */
    .panel-news {
      background: radial-gradient(circle at 0% 0%, rgba(212,194,123,0.08) 0%, rgba(0,0,0,0) 60%) ,
                  #1f2022;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.8);
      padding: 16px;
    }

    .panel-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #ffffff;
      margin: 0;
      line-height: 1.3;
    }

    .panel-accent {
      flex: 1;
      height: 3px;
      margin-left: 12px;
      border-radius: 2px;
      background: linear-gradient(to right, #d4c27b 0%, rgba(212,194,123,0) 70%);
    }

    /* empty state */
    .empty-state {
      background: #2a2b2f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 24px;
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      line-height: 1.4;
      text-align: center;
      margin-bottom: 12px;
    }
    .hidden { display: none !important; }

    /* news grid/cards */
    .news-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media(min-width:600px){
      .news-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(min-width:1024px){
      .news-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      background: #2a2b2f;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: inherit;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #1a1b1e;
      color: transparent;
      display: block;
    }

    .meta {
      padding: 12px 14px 16px;
    }

    .meta .source {
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c27b; /* gold-ish */
      margin-bottom: 6px;
    }

    .meta .title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .meta .date {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
    }

    /* footer */
    .site-footer {
      background: #1f2022;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      line-height: 1.4;
    }

    .legal {
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
      font-size: 0.8rem;
    }

    .build-line {
      color: rgba(255,255,255,0.45);
      word-break: break-word;
      font-size: 0.75rem;
    }
  </style>
</head>

<body class="app-shell">
  <!-- HEADER -->
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <div class="brand-icon">
          <span class="brand-mark"></span>
        </div>
        <div class="brand-text">
          <div class="team-name">Purdue Boilermakers</div>
          <div class="team-sub">Men’s Basketball Hub</div>
        </div>
      </div>

      <button id="hamburger" class="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- NAV OVERLAY (FORCED HIDDEN ABOVE) -->
    <nav id="nav" class="main-nav">
      <ul>
        <li><a href="./">Home</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content-wrap">
    <section class="panel panel-news">
      <div class="panel-head">
        <h2 class="panel-title">Latest Headlines</h2>
        <div class="panel-accent"></div>
      </div>

      <!-- Fallback if nothing loads -->
      <div id="news-empty" class="empty-state">
        <p>No Purdue Men’s Basketball headlines yet. New stories will appear here automatically.</p>
      </div>

      <!-- JS will fill this with up to 20 cards -->
      <div id="news-grid" class="news-grid"></div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="legal">
        Auto-updating Purdue Hoops Hub • © <span id="year"></span>
      </div>
      <div id="build-line" class="build-line">
        <!-- JS writes:
             Build: 2025-10-24T01:23:45Z • commit abc1234 • 20 items • updated 5 min ago
        -->
      </div>
    </div>
  </footer>

  <!-- APP LOGIC -->
  <script src="static/js/pro.js"></script>
</body>
</html>
