<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1017" />
  <title>Purdue Boilermakers Hub</title>

  <link rel="stylesheet" href="./static/css/app.css?v=6" />
  <link rel="stylesheet" href="./static/css/mobile-tweaks.css?v=6" />

  <meta name="description" content="Purdue Boilermakers Men's Basketball Hub — live Purdue MBB headlines, schedule, roster, rankings, and insider links auto-updated via GitHub Actions.">
  <link rel="icon" href="./static/img/favicon.png">
</head>

<body>
  <!-- Header: brand only -->
  <header class="topbar">
    <div class="brand-badge"><div class="brand-dot"></div></div>
    <div class="brand-title">Boilermakers</div>
  </header>

  <main class="wrap">
    <div class="grid">
      <!-- NEWS -->
      <section id="news" class="panel">
        <div class="panel-hd"><h2>Top Headlines</h2></div>
        <div class="panel-subnote">Refreshed every 30 min • Auto-updated via GitHub Actions</div>

        <div class="pills" id="newsPills" style="margin-top:10px;">
          <button class="pill active" data-tier="all">all</button>
          <button class="pill" data-tier="official">official</button>
          <button class="pill" data-tier="insiders">insiders</button>
          <button class="pill" data-tier="national">national</button>
        </div>

        <div id="hero" class="hero"></div>
        <div id="cards" class="card-grid" style="margin-top:12px;"></div>
      </section>

      <!-- RAIL -->
      <aside class="rail">
        <section id="rankings" class="panel">
          <h3>Rankings</h3>
          <div class="simple-list" id="rankingsList">
            <div>AP Top 25: —</div>
            <div>KenPom: —</div>
          </div>
        </section>

        <section id="schedule" class="panel">
          <h3>Upcoming Schedule</h3>
          <div id="scheduleList" class="simple-list"></div>
          <div id="schedStamp" class="footer-note" style="margin-top:6px;"></div>
        </section>

        <section id="insiders" class="panel">
          <h3>Insider / Beat Links</h3>
          <div id="insiderList" class="simple-list">No insider items (yet).</div>
        </section>
      </aside>
    </div>

    <!-- ROSTER -->
    <section id="roster" class="panel" style="margin-top:18px;">
      <h3>Roster</h3>
      <div id="rosterGrid" class="roster">
        <div class="muted small">Loading roster…</div>
      </div>
    </section>

    <!-- VIDEOS -->
    <section id="videos" class="panel" style="margin-top:18px;">
      <h3>Latest Videos</h3>
      <div id="videoGrid" class="card-grid"></div>
    </section>
  </main>

  <footer class="footer-fixed">
    © 2025 Boilermakers Hub • Auto-updated every 30 min
  </footer>

  <script>
  const $ = (sel, r=document)=>r.querySelector(sel);
  const $$ = (sel, r=document)=>Array.from(r.querySelectorAll(sel));
  const esc = (s="") => (s+"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  const timeAgo = (ts)=>{ if(ts<1e12) ts*=1000; const d=Date.now()-ts; const m=Math.floor(d/60000); if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; return Math.floor(h/24)+"d ago"; };
  async function loadJson(p){ try{ const r=await fetch(p+"?v="+Date.now(),{cache:"no-store"}); if(!r.ok) throw 0; return await r.json(); } catch { return null; } }

  /* client MBB filter (backstop) */
  const MBB_POS = ["men's basketball","mens basketball","mbb","basketball","hoops","matt painter","mackey","paint crew","zach edey","braden smith","fletcher loyer","caleb furst","ncaa","big ten","march madness","exhibition","tournament"];
  const FB_NEG  = ["football","qb","quarterback","running back","wide receiver","offensive line","defensive line","ryan walters","hudson card","gridiron","ross-ade"];
  const PU_CORE = ["purdue","boilermaker","west lafayette","purduesports.com"];
  function isMBB(item){
    const t = (item.title+" "+(item.summary||"")+" "+item.link+" "+(item.source||"")).toLowerCase();
    const isPurdue = PU_CORE.some(k=>t.includes(k));
    const looksFB  = FB_NEG.some(k=>t.includes(k));
    const looksBB  = MBB_POS.some(k=>t.includes(k)) || /\/(mbb|mens?-basketball|basketball)\//.test((item.link||"").toLowerCase());
    if (!isPurdue && item.tier!=="official") return false;
    if (looksFB && !looksBB) return false;
    return looksBB;
  }
  function byTier(items,t){ return t==="all" ? items : items.filter(i=>i.tier===t); }

  let NEWS_CACHE=null, CURRENT_TIER="all";
  function drawNews(){
    const full = byTier(NEWS_CACHE, CURRENT_TIER).slice(0,10); // hard cap 10 on UI
    const hero = $("#hero"), cards = $("#cards"), insiderList = $("#insiderList");

    if (!full.length){ hero.innerHTML = `<div class="muted small">No Purdue MBB headlines yet.</div>`; cards.innerHTML=""; insiderList.textContent="No insider items (yet)."; return; }

    const h = full[0];
    hero.innerHTML = `
      <a class="hero-img" href="${esc(h.link)}" target="_blank" rel="noopener">
        ${h.image?`<img src="${esc(h.image)}" alt="">`:``}
      </a>
      <div class="hero-meta">
        <span class="small muted">${esc(h.tier)} • ${esc(h.source)}</span><br/>
        <a href="${esc(h.link)}" target="_blank" class="hero-title">${esc(h.title)}</a><br/>
        <span class="small muted">${timeAgo(h.ts)}</span>
      </div>`;

    cards.innerHTML = full.slice(1, 10).map(it=>`
      <div class="card">
        ${it.image?`<div class="card-thumb"><img src="${esc(it.image)}" alt=""></div>`:""}
        <div class="card-body">
          <div class="card-kickers">
            <span class="kicker">${esc(it.tier)}</span>
            <span class="kicker src">${esc(it.source)}</span>
          </div>
          <a href="${esc(it.link)}" target="_blank" class="card-title">${esc(it.title)}</a>
          <div class="card-meta">${timeAgo(it.ts)} • ${esc(it.source)}</div>
        </div>
      </div>
    `).join("");

    const insiderItems = NEWS_CACHE.filter(i=>i.tier==="insiders");
    $("#insiderList").innerHTML = insiderItems.length
      ? insiderItems.slice(0,6).map(i=>`<a class="link-card" href="${esc(i.link)}" target="_blank" rel="noopener">${esc(i.title)}</a>`).join("")
      : "No insider items (yet).";
  }

  async function initNews(){
    const news = await loadJson("static/data/news.json");
    const items = (news?.items || []).filter(isMBB)
      .sort((a,b)=> (b.ts < 1e12 ? b.ts*1000 : b.ts) - (a.ts < 1e12 ? a.ts*1000 : a.ts));
    NEWS_CACHE = items;
    drawNews();
    $$("#newsPills .pill").forEach(p=>{
      p.addEventListener("click", ()=>{
        $$("#newsPills .pill").forEach(x=>x.classList.remove("active"));
        p.classList.add("active");
        CURRENT_TIER = p.dataset.tier;
        drawNews();
      });
    });
  }

  async function initRoster(){
    const r = await loadJson("static/teams/purdue-mbb/roster.json");
    const el = $("#rosterGrid");
    if (!r || !Array.isArray(r.players) || !r.players.length){
      el.innerHTML = `<div class="muted small">No roster data.</div>`;
      return;
    }
    el.innerHTML = r.players.map(p=>`
      <div class="player">
        <div class="num">#${esc(p.num||"")}</div>
        <div class="name">${esc(p.name||"")}</div>
        <div class="meta">${[p.pos, p.height, p.weight?`${p.weight} lbs`:"", p.year].filter(Boolean).join(" • ")}</div>
      </div>
    `).join("");
  }

  async function initVideos(){
    const news = await loadJson("static/data/news.json");
    const vids = (news?.items || []).filter(i=>/youtube\.com|youtu\.be/i.test(i.link) && isMBB(i));
    const el = $("#videoGrid");
    if(!vids.length){ el.innerHTML = `<div class="muted small">No videos found.</div>`; return; }
    el.innerHTML = vids.slice(0,6).map(v=>`
      <div class="card">
        ${v.image?`<div class="card-thumb"><img src="${esc(v.image)}" alt=""></div>`:""}
        <div class="card-body">
          <a class="card-title" href="${esc(v.link)}" target="_blank" rel="noopener">${esc(v.title)}</a>
          <div class="card-meta">${esc(v.source)}</div>
        </div>
      </div>
    `).join("");
  }

  async function boot(){
    await initNews();
    if (window.PRO && typeof PRO.hydratePanels === "function") { PRO.hydratePanels(); }
    await initRoster();
    await initVideos();
  }
  (document.readyState === "loading") ? document.addEventListener("DOMContentLoaded", boot, {once:true}) : boot();
  </script>

  <script src="./static/js/pro.js?v=6"></script>
</body>
</html>
