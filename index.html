<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Hub</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./static/css/styles.css" />
  <link rel="icon" href="./static/icons/icon-192.png" />
  <meta name="theme-color" content="#0b0d12" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <img src="./static/icons/icon-192.png" alt="" class="brand-icon" />
        <div class="brand-text">
          <h1>Team Hub</h1>
          <p class="subtitle">Trusted, fast, one place.</p>
        </div>
      </div>
      <div class="controls">
        <label class="sr-only" for="team">Team</label>
        <select id="team" class="select">
          <option value="purdue-mbb" selected>Purdue MBB</option>
          <!-- Add more teams here when you add their items.json -->
        </select>
        <button id="refresh" class="btn">Refresh</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="panel-head">
        <h2>Daily Brief</h2>
        <span id="dailyCount" class="count-badge"></span>
      </div>
      <div id="daily" class="cards"></div>
      <div id="dailyEmpty" class="empty hidden">No items yet. Check back soon.</div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Top Feed</h2>
        <span id="feedCount" class="count-badge"></span>
      </div>
      <div id="feed" class="cards"></div>
      <div id="feedEmpty" class="empty hidden">No items yet. Check back soon.</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Hosted on GitHub Pages • Auto-updates via GitHub Actions</p>
    </div>
  </footer>

  <template id="card-template">
    <article class="card">
      <a class="thumb" target="_blank" rel="noopener">
        <img alt="">
      </a>
      <div class="content">
        <a class="title" target="_blank" rel="noopener"></a>
        <div class="meta">
          <span class="source"></span>
          <span class="dot">•</span>
          <time class="when"></time>
          <span class="dot">•</span>
          <span class="trust"></span>
        </div>
        <p class="summary"></p>
      </div>
    </article>
  </template>

  <script src="./static/js/app.js"></script>
</body>
</html>
