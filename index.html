<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Purdue Men's Basketball — 2025-26 Hub</title>
  <meta name="theme-color" content="#1b1c1e" />
  <link rel="stylesheet" href="static/css/pro.css" />
</head>
<body>
  <header class="site-header">
    <div class="shell">
      <div class="brand">
        <svg viewBox="0 0 24 24" class="brand-logo"><path d="M3 12l3-5h10l-3 5 3 5H6l-3-5z"></path></svg>
        <div class="brand-copy">
          <h1>Purdue Boilermakers</h1>
          <p class="sub">Men’s Basketball Hub</p>
        </div>
      </div>
      <button id="hamburger" class="hamburger">☰</button>
      <nav id="nav" class="nav">
        <a href="#news">News</a>
        <a href="#videos">Videos</a>
        <a href="#schedule">Schedule</a>
        <a href="#rankings">Rankings</a>
        <a href="#links">Links</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section id="news" class="block">
      <div class="block-head"><h2>Latest Headlines</h2><span class="accent"></span></div>
      <div id="news-grid" class="grid"></div>
      <div id="news-empty" class="empty hidden">Loading headlines…</div>
    </section>

    <section id="videos" class="block">
      <div class="block-head"><h2>Video Highlights</h2><span class="accent"></span></div>
      <div id="video-row" class="video-row"></div>
    </section>

    <section class="columns">
      <section id="schedule" class="block col">
        <div class="block-head"><h2>Schedule</h2><span class="accent"></span></div>
        <table class="table"><thead><tr><th>Date</th><th>Opponent</th><th>Result</th></tr></thead><tbody></tbody></table>
      </section>

      <section id="rankings" class="block col">
        <div class="block-head"><h2>Rankings & NIL</h2><span class="accent"></span></div>
        <div class="rank-cards">
          <div class="card kpi"><div class="kpi-label">AP Top 25</div><div id="ap-rank" class="kpi-value">—</div></div>
          <div class="card kpi"><div class="kpi-label">KenPom</div><div id="kenpom-rank" class="kpi-value">—</div></div>
        </div>
        <div class="nil"><h3>NIL Leaderboard</h3><ul id="nil-list"></ul></div>
      </section>
    </section>

    <section id="links" class="block">
      <div class="block-head"><h2>Key Sources</h2><span class="accent"></span></div>
      <ul class="links" id="sources-list"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell"><p>Auto-updating Purdue Hub • © <span id="year"></span></p></div>
  </footer>

  <script src="static/js/pro.js" defer></script>
</body>
</html>
