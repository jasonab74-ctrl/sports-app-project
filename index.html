<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Team Hub — Pro Template</title>
<link rel="stylesheet" href="./static/css/pro.css"/>
</head>
<body>
<header class="header">
  <div class="wrap bar">
    <div class="brand">
      <img id="logo" src="./static/assets/logo.png" alt="logo"/>
      <strong id="wordmark">Team Hub</strong>
    </div>
    <nav class="nav"></nav>
    <div class="controls">
      <select class="select" id="teamSelect">
        <option value="purdue-mbb">Purdue MBB</option>
      </select>
      <button class="btn" id="refreshBtn">Refresh</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="image"></div>
  <div class="wrap overlay">
    <h1 style="margin:0 0 6px 0; font-size:28px; font-weight:850;">Top Stories</h1>
    <div class="kpis">
      <div class="kpi">Latest updates</div>
      <div class="kpi">Videos &amp; Highlights</div>
      <div class="kpi">Schedule</div>
    </div>
  </div>
</section>

<main class="wrap">
  <div class="grid">
    <div>
      <section id="videos" class="panel">
        <div class="head"><h2 style="margin:0;font-size:18px">Videos & Highlights</h2></div>
        <div class="body">
          <div id="videoRow" class="video-row"></div>
        </div>
      </section>

      <section id="news" class="panel">
        <div class="head"><h2 style="margin:0;font-size:18px">Latest News</h2></div>
        <div class="body">
          <div id="newsGrid" class="news-grid"></div>
        </div>
      </section>
    </div>

    <aside>
      <section id="schedule" class="panel widget">
        <div class="head"><h2 style="margin:0;font-size:18px">Upcoming Schedule</h2></div>
        <div class="body">
          <div id="scheduleList" class="schedule-list"></div>
          <div style="margin-top:10px"><a class="btn" href="#" style="text-decoration:none; display:inline-block">Full Schedule</a></div>
        </div>
      </section>

      <section class="panel widget">
        <div class="head"><h2 style="margin:0;font-size:18px">Social</h2></div>
        <div class="body">
          <div id="socialCol" class="social"></div>
        </div>
      </section>
    </aside>
  </div>
</main>

<footer class="footer"><div class="wrap">© Team Hub. Themeable pro-style template.</div></footer>

<script src="./static/js/pro.js"></script>
<script>
document.getElementById('refreshBtn').addEventListener('click', ()=> location.reload());
</script>
</body>
</html>
